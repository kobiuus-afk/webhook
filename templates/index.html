<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pago Seguro</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>
<div class="container">
<pre class="banner">WEBHOOK</pre>

<h2>PAGO SEGURO</h2>

<input id="amount" type="number" min="10" placeholder="Monto MXN (mínimo 10)">

<div id="payment-element-placeholder">
El Payment Element se inicializa desde Stripe.
</div>

<button id="payBtn">PAGAR AHORA</button>

<p>Monto mínimo: $10 MXN</p>
</div>

<script>
document.getElementById("payBtn").onclick = async () => {
  const amount = document.getElementById("amount").value;
  if (!amount || Number(amount) < 10) {
    alert("Monto mínimo $10 MXN");
    return;
  }
  alert("Implementa aquí Stripe Payment Element usando el clientSecret devuelto por /create-payment-intent.");
};
</script>
</body>
</html>
